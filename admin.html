<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WF-ADMIN</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0E1117; --bg-1: #1A1E24; --bg-2: #20252D; --bg-3: #252B35;
      --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.14);
      --text-0: #EDF0F3; --text-1: #C8D2DC; --text-2: #96A2B0; --text-3: #6A7888;
      --green: #1A9E5C; --green-bright: #2DC76D; --amber: #D4850A; --red: #E03434;
      --silver: #CCD8E4; --silver-dim: #8A9AAA;
      --font-mono: 'DM Mono', monospace; --font-display: 'Bebas Neue', sans-serif;
      --radius: 4px;
    }
    body { background: var(--bg); color: var(--text-0); font-family: var(--font-mono); min-height: 100vh; }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--bg-1); border: 1px solid var(--border-md); border-radius: var(--radius); padding: 40px; width: min(360px, 92vw); }
    .login-title { font-family: var(--font-display); font-size: 32px; letter-spacing: 4px; color: var(--text-0); margin-bottom: 6px; }
    .login-sub { font-size: 10px; letter-spacing: 2px; color: var(--text-3); margin-bottom: 28px; }
    .login-input { width: 100%; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: var(--font-mono); font-size: 13px; color: var(--text-0); outline: none; margin-bottom: 12px; }
    .login-input:focus { border-color: var(--border-md); }
    .login-btn { width: 100%; padding: 11px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; background: var(--bg-3); border: 1px solid var(--border-md); border-radius: var(--radius); color: var(--text-0); cursor: pointer; transition: all 0.15s; }
    .login-btn:hover { border-color: var(--silver-dim); }
    .login-error { color: var(--red); font-size: 10px; letter-spacing: 1.5px; margin-top: 8px; display: none; }

    /* Admin panel */
    .admin-panel { display: none; }
    .admin-nav { background: var(--bg-1); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; gap: 24px; height: 56px; }
    .admin-nav__title { font-family: var(--font-display); font-size: 20px; letter-spacing: 3px; color: var(--text-0); }
    .admin-nav__sub { font-size: 9px; letter-spacing: 2px; color: var(--text-3); }
    .admin-nav__logout { margin-left: auto; font-size: 9px; letter-spacing: 2px; color: var(--text-3); cursor: pointer; padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.15s; }
    .admin-nav__logout:hover { color: var(--text-0); border-color: var(--border-md); }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 32px; }

    /* Stats */
    .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .admin-stat { background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .admin-stat__val { font-family: var(--font-display); font-size: 32px; letter-spacing: 2px; color: var(--text-0); }
    .admin-stat__label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); margin-top: 4px; }

    /* Toolbar */
    .admin-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .admin-search { flex: 1; min-width: 200px; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; font-family: var(--font-mono); font-size: 11px; color: var(--text-0); outline: none; }
    .admin-search:focus { border-color: var(--border-md); }
    .admin-btn { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-2); color: var(--text-2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .admin-btn:hover { color: var(--text-0); border-color: var(--border-md); }
    .admin-btn--danger { border-color: rgba(224,52,52,0.3); color: var(--red); }
    .admin-btn--danger:hover { background: rgba(224,52,52,0.08); border-color: var(--red); }

    /* Table */
    .admin-table { background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .admin-table-header { display: grid; grid-template-columns: 24px 44px 110px 1fr 120px 170px 95px 100px; gap: 10px; padding: 10px 14px; border-bottom: 2px solid var(--border-md); font-size: 8.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); }
    .admin-row { display: grid; grid-template-columns: 24px 44px 110px 1fr 120px 170px 95px 100px; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .admin-row:last-child { border-bottom: none; }
    .admin-row:hover { background: var(--bg-2); }
    .admin-row.deleted { opacity: 0.3; }
    .admin-cb { width: 14px; height: 14px; cursor: pointer; accent-color: var(--silver-dim); }
    .admin-photo { width: 36px; height: 36px; border-radius: var(--radius); object-fit: cover; border: 1px solid var(--border); }
    .admin-num { font-size: 9px; letter-spacing: 1px; color: var(--text-3); }
    .admin-name { font-family: var(--font-display); font-size: 15px; letter-spacing: 1.5px; color: var(--text-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-origin { font-size: 10px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-rating { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
    .admin-date { font-size: 9px; color: var(--text-3); }
    .admin-actions { display: flex; gap: 6px; }
    .act-btn { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; border: 1px solid var(--border); background: none; color: var(--text-2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .act-btn:hover { color: var(--text-0); }
    .act-btn--del { border-color: rgba(224,52,52,0.3); color: rgba(224,52,52,0.7); }
    .act-btn--del:hover { border-color: var(--red); color: var(--red); background: rgba(224,52,52,0.06); }
    .act-btn--restore { border-color: rgba(45,199,109,0.3); color: rgba(45,199,109,0.7); }
    .act-btn--restore:hover { border-color: var(--green-bright); color: var(--green-bright); }

    /* Confirm modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-1); border: 1px solid var(--border-md); border-radius: var(--radius); padding: 32px; width: min(400px, 92vw); }
    .modal-title { font-family: var(--font-display); font-size: 24px; letter-spacing: 3px; color: var(--red); margin-bottom: 12px; }
    .modal-text { font-size: 13px; color: var(--text-1); line-height: 1.7; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; }

    .empty-admin { padding: 48px; text-align: center; font-size: 10px; letter-spacing: 2px; color: var(--text-3); }

    @media (max-width: 900px) {
      .admin-stats { grid-template-columns: repeat(2, 1fr); }
      .admin-table-header { display: none; }
      .admin-row { grid-template-columns: 24px 36px 1fr 80px; }
      .admin-num, .admin-origin, .admin-date { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-title">WF-ADMIN</div>
      <div class="login-sub">WRAFF FORCE · RESTRICTED ACCESS · CLEARANCE REQUIRED</div>
      <input class="login-input" type="password" id="pwInput" placeholder="Passwort" autocomplete="off">
      <button class="login-btn" id="loginBtn">ZUGANG ANFORDERN →</button>
      <div class="login-error" id="loginError">ZUGANG VERWEIGERT. FALSCHES PASSWORT.</div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-nav">
      <div class="admin-nav__title">WF-ADMIN</div>
      <div class="admin-nav__sub">BEWERBERVERWALTUNG · RESTRICTED</div>
      <div class="admin-nav__logout" id="logoutBtn">ABMELDEN ×</div>
    </div>

    <div class="admin-body">

      <div class="admin-stats">
        <div class="admin-stat">
          <div class="admin-stat__val" id="aStatTotal">—</div>
          <div class="admin-stat__label">Gesamt</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat__val" style="color:var(--green-bright);" id="aStatAccepted">—</div>
          <div class="admin-stat__label">Zugelassen</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat__val" style="color:var(--amber);" id="aStatWatch">—</div>
          <div class="admin-stat__label">Unter Beobachtung</div>
        </div>
        <div class="admin-stat">
          <div class="admin-stat__val" style="color:var(--red);" id="aStatRejected">—</div>
          <div class="admin-stat__label">Abgelehnt</div>
        </div>
      </div>

      <div class="admin-toolbar">
        <input class="admin-search" type="text" id="adminSearch" placeholder="Suche nach Name, Herkunft…">
        <button class="admin-btn admin-btn--danger" id="deleteSelectedBtn">AUSWAHL LÖSCHEN</button>
        <button class="admin-btn admin-btn--danger" id="deleteAllBtn">ALLE LÖSCHEN</button>
      </div>

      <div class="admin-table">
        <div class="admin-table-header">
          <span><input type="checkbox" id="selectAll" class="admin-cb"></span>
          <span></span>
          <span>NUMMER</span>
          <span>DECKNAME</span>
          <span>HERKUNFT</span>
          <span>EINSTUFUNG</span>
          <span>DATUM</span>
          <span>AKTIONEN</span>
        </div>
        <div id="adminRows"></div>
      </div>

    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-title">BESTÄTIGUNG ERFORDERLICH</div>
      <div class="modal-text" id="confirmText">Bist du sicher?</div>
      <div class="modal-actions">
        <button class="admin-btn admin-btn--danger" id="confirmOk">LÖSCHEN</button>
        <button class="admin-btn" id="confirmCancel">ABBRECHEN</button>
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = 'unruhe';
    const STORAGE_KEY = 'wf-applicants';

    const INCOGNITO = `data:image/svg+xml;base64,${btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" fill="#1A1E24"/><circle cx="32" cy="24" r="12" fill="#2A3040"/><ellipse cx="32" cy="52" rx="20" ry="14" fill="#2A3040"/><text x="32" y="28" text-anchor="middle" font-size="14" fill="#6A7888" font-family="monospace">?</text></svg>`)}`;

    function getRatingColor(r) {
      if (['WEITERLEITUNG EMPFOHLEN','FORWARDING RECOMMENDED'].includes(r)) return 'var(--green-bright)';
      if (['UNTER BEOBACHTUNG','UNDER OBSERVATION'].includes(r)) return 'var(--amber)';
      if (['BEWERBUNG ABGELEHNT','APPLICATION REJECTED'].includes(r)) return 'var(--red)';
      return 'var(--silver-dim)';
    }

    // ── AUTH ──
    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    function tryLogin() {
      const pw = document.getElementById('pwInput').value;
      if (pw === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAdmin();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('pwInput').value = '';
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('pwInput').value = '';
    });

    // ── LOAD ──
    let applicants = [];

    async function loadAdmin() {
      try {
        const result = await window.storage.get(STORAGE_KEY, true);
        applicants = result ? JSON.parse(result.value) : [];
      } catch { applicants = []; }
      updateStats();
      renderRows(applicants);
    }

    async function saveApplicants() {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify(applicants), true);
      } catch(e) { alert('Fehler beim Speichern: ' + e.message); }
    }

    function updateStats() {
      document.getElementById('aStatTotal').textContent    = applicants.length;
      document.getElementById('aStatAccepted').textContent = applicants.filter(a => ['WEITERLEITUNG EMPFOHLEN','FORWARDING RECOMMENDED'].includes(a.rating)).length;
      document.getElementById('aStatWatch').textContent    = applicants.filter(a => ['UNTER BEOBACHTUNG','UNDER OBSERVATION'].includes(a.rating)).length;
      document.getElementById('aStatRejected').textContent = applicants.filter(a => ['BEWERBUNG ABGELEHNT','APPLICATION REJECTED'].includes(a.rating)).length;
    }

    function renderRows(list) {
      const container = document.getElementById('adminRows');
      container.innerHTML = '';
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-admin">KEINE EINTRÄGE VORHANDEN</div>';
        return;
      }
      [...list].reverse().forEach((app, displayIdx) => {
        const realIdx = applicants.findIndex(a => a.num === app.num);
        const row = document.createElement('div');
        row.className = 'admin-row';
        row.innerHTML = `
          <input type="checkbox" class="admin-cb row-cb" data-num="${app.num}">
          <img class="admin-photo" src="${app.photo || INCOGNITO}" alt="">
          <span class="admin-num">${app.num}</span>
          <span class="admin-name">${app.callsign}</span>
          <span class="admin-origin">${app.origin || '—'}</span>
          <span class="admin-rating" style="color:${getRatingColor(app.rating)}">● ${app.rating}</span>
          <span class="admin-date">${app.date}</span>
          <div class="admin-actions">
            <button class="act-btn act-btn--del" data-num="${app.num}">LÖSCHEN</button>
          </div>
        `;
        row.querySelector('.act-btn--del').addEventListener('click', () => {
          showConfirm(`Eintrag "${app.callsign}" (${app.num}) wirklich löschen?`, async () => {
            applicants = applicants.filter(a => a.num !== app.num);
            await saveApplicants();
            updateStats();
            const search = document.getElementById('adminSearch').value.toLowerCase();
            renderRows(search ? applicants.filter(a => a.callsign.toLowerCase().includes(search) || (a.origin||'').toLowerCase().includes(search)) : applicants);
          });
        });
        container.appendChild(row);
      });
    }

    // Select all
    document.getElementById('selectAll').addEventListener('change', (e) => {
      document.querySelectorAll('.row-cb').forEach(cb => cb.checked = e.target.checked);
    });

    // Delete selected
    document.getElementById('deleteSelectedBtn').addEventListener('click', () => {
      const selected = [...document.querySelectorAll('.row-cb:checked')].map(cb => cb.dataset.num);
      if (selected.length === 0) { alert('Keine Einträge ausgewählt.'); return; }
      showConfirm(`${selected.length} Einträge wirklich löschen?`, async () => {
        applicants = applicants.filter(a => !selected.includes(a.num));
        await saveApplicants();
        updateStats();
        renderRows(applicants);
      });
    });

    // Delete all
    document.getElementById('deleteAllBtn').addEventListener('click', () => {
      if (applicants.length === 0) { alert('Keine Einträge vorhanden.'); return; }
      showConfirm(`ALLE ${applicants.length} Einträge wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.`, async () => {
        applicants = [];
        await saveApplicants();
        updateStats();
        renderRows([]);
      });
    });

    // Search
    document.getElementById('adminSearch').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderRows(q ? applicants.filter(a => a.callsign.toLowerCase().includes(q) || (a.origin||'').toLowerCase().includes(q) || a.rating.toLowerCase().includes(q)) : applicants);
    });

    // Confirm modal
    let confirmCallback = null;
    function showConfirm(text, cb) {
      document.getElementById('confirmText').textContent = text;
      document.getElementById('confirmModal').classList.add('open');
      confirmCallback = cb;
    }
    document.getElementById('confirmOk').addEventListener('click', async () => {
      document.getElementById('confirmModal').classList.remove('open');
      if (confirmCallback) await confirmCallback();
      confirmCallback = null;
    });
    document.getElementById('confirmCancel').addEventListener('click', () => {
      document.getElementById('confirmModal').classList.remove('open');
      confirmCallback = null;
    });
  </script>
</body>
</html>
